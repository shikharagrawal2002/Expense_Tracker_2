<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ledger</title>
    <script>
      // GitHub Pages serves this for any unknown path (client-side routes like
      // /budgets, /transactions/123, etc). It re-encodes the path into a query
      // string and redirects to index.html, which decodes it back below.
      // Standard "spa-github-pages" trick — see https://github.com/rafgraph/spa-github-pages
      var segmentCount = 1 // number of path segments to keep before the app route (repo name)
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
